<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>高雄市都市計畫互動地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d11;--s:#13131a;--s2:#1a1a22;--bd:#252530;--t:#dcdbd4;--t2:#8888a0;--t3:#50505c;--ac:#4a8fd4}
body{font-family:'Noto Sans TC',Arial,sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;flex-direction:column;overflow:hidden}

#bar{background:var(--s);border-bottom:1px solid var(--bd);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;z-index:999}
.btitle{font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
.bsep{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.ctrl{display:flex;align-items:center;gap:4px}
.ctrl label{font-size:10px;color:var(--t2);white-space:nowrap}
select,#q{font-size:11px;padding:4px 7px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t);outline:none;cursor:pointer}
select:focus,#q:focus{border-color:var(--ac)}
#q{width:145px}

#body{flex:1;display:flex;overflow:hidden}
#map{flex:1;position:relative}

#side{width:315px;flex-shrink:0;background:var(--s);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#info{padding:10px 13px;border-bottom:1px solid var(--bd);background:#101018;flex-shrink:0;min-height:72px}
#info-name{font-size:12px;font-weight:600;color:#fff;margin-bottom:2px}
#info-sub{font-size:10px;color:var(--t2)}
#info-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.ichip{font-size:10px;padding:2px 7px;border-radius:8px;border:1px solid var(--bd);color:var(--t2);background:var(--s2)}
.ichip.hi{background:#1a2e42;border-color:#2a4a62;color:#7ab8e8}

#qf{padding:7px 11px;border-bottom:1px solid var(--bd);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;align-items:center}
.ql{font-size:10px;color:var(--t3);white-space:nowrap}
.qp{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--t2);cursor:pointer;white-space:nowrap;transition:.1s}
.qp:hover{border-color:var(--t2);color:var(--t)}
.qp.on{color:#fff;border-color:transparent}
.qp[data-v="通盤檢討"].on{background:#1a4e7a}
.qp[data-v="個案變更"].on{background:#5a2e08}
.qp[data-v="主要計畫"].on{background:#5a1858}
.qp[data-v="細部計畫"].on{background:#104e30}
.qp[data-v="特定區計畫"].on{background:#5a2e00}

#list{flex:1;overflow-y:auto}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:var(--bd)}
.card{padding:8px 13px;border-bottom:.5px solid #181820;transition:.08s}
.card:hover{background:var(--s2)}
.ctop{display:flex;justify-content:space-between;margin-bottom:2px}
.cno{font-size:10px;color:var(--t3);font-family:monospace}
.cdate{font-size:10px;color:var(--t3)}
.ctitle{font-size:11px;color:var(--t);line-height:1.5;margin-bottom:3px}
.tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 5px;border-radius:6px;color:#fff}
.t-通盤{background:#1a4e7a}.t-個案{background:#5a2e08}
.t-主要{background:#5a1858}.t-細部{background:#104e30}.t-特定{background:#5a2e00}.t-其他{background:#383840}
.ttp{background:#282838;color:var(--t2)}
#foot{padding:5px 13px;font-size:10px;color:var(--t3);background:#0a0a10;border-top:1px solid var(--bd);flex-shrink:0}
.empty{padding:24px 13px;text-align:center;color:var(--t3);font-size:11px;line-height:2}

#leg{position:absolute;bottom:18px;left:10px;z-index:900;background:rgba(10,10,16,.92);border:1px solid #222230;border-radius:8px;padding:9px 11px;backdrop-filter:blur(6px)}
.legt{font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.legr{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2);margin-bottom:3px}
.legb{width:14px;height:9px;border-radius:2px;opacity:.85;flex-shrink:0}

#hud{position:absolute;top:8px;right:8px;z-index:900;display:flex;gap:4px}
.hud{background:rgba(10,10,16,.88);border:1px solid #222230;border-radius:12px;padding:4px 9px;font-size:10px;color:var(--t2)}
.hud strong{color:var(--t)}

#tip{position:fixed;z-index:2000;background:rgba(8,8,14,.93);color:var(--t);font-size:11px;padding:8px 11px;border-radius:7px;pointer-events:none;display:none;max-width:240px;line-height:1.5;border:1px solid #22223a}
.tipn{font-weight:600;color:#fff;margin-bottom:2px}
.tipd{color:var(--t2);font-size:10px}
.tiph{color:var(--t3);font-size:9px;margin-top:3px}
.leaflet-container{background:#080810}
</style>
</head>
<body>
<div id="bar">
  <span class="btitle">🗺 高雄市都市計畫互動地圖</span>
  <div class="bsep"></div>
  <div class="ctrl"><label>計畫區</label>
    <select id="sel-z"><option value="">全部（59區）</option></select>
  </div>
  <div class="ctrl"><label>種類</label>
    <select id="sel-cat">
      <option value="">全部</option>
      <option value="通盤檢討">通盤檢討</option>
      <option value="個案變更">個案變更</option>
    </select>
  </div>
  <div class="ctrl"><label>位階</label>
    <select id="sel-lv">
      <option value="">全部</option>
      <option value="主要計畫">主要計畫</option>
      <option value="細部計畫">細部計畫</option>
      <option value="特定區計畫">特定區計畫</option>
    </select>
  </div>
  <div class="ctrl"><label>年份</label>
    <select id="sel-yr"><option value="">全部年份</option></select>
  </div>
  <input id="q" type="text" placeholder="🔍 搜尋案名…">
</div>

<div id="body">
  <div id="map">
    <div id="leg">
      <div class="legt">計畫位階</div>
      <div class="legr"><div class="legb" style="background:#2a6aaa"></div>主要計畫/都市計畫</div>
      <div class="legr"><div class="legb" style="background:#1a6a4a"></div>細部計畫</div>
      <div class="legr"><div class="legb" style="background:#7a4a10"></div>特定區計畫</div>
      <div class="legr"><div class="legb" style="background:#5a90e8;opacity:.9"></div>已選取</div>
    </div>
    <div id="hud">
      <div class="hud">計畫區 <strong>59</strong></div>
      <div class="hud">案件 <strong id="h-plan">1,587</strong></div>
    </div>
  </div>
  <div id="side">
    <div id="info">
      <div id="info-name">點選地圖計畫區查看相關計畫案</div>
      <div id="info-sub">或使用上方篩選條件</div>
      <div id="info-chips"></div>
    </div>
    <div id="qf">
      <span class="ql">快篩：</span>
      <button class="qp" data-f="cat" data-v="通盤檢討">通盤檢討</button>
      <button class="qp" data-f="cat" data-v="個案變更">個案變更</button>
      <button class="qp" data-f="lv" data-v="主要計畫">主要計畫</button>
      <button class="qp" data-f="lv" data-v="細部計畫">細部計畫</button>
      <button class="qp" data-f="lv" data-v="特定區計畫">特定區計畫</button>
    </div>
    <div id="list"><div class="empty">點選地圖計畫區<br>查看相關都市計畫案件</div></div>
    <div id="foot"></div>
  </div>
</div>
<div id="tip"></div>

const ZONES=D.zones, PLANS=D.plans, ZP=D.zp;

// 計畫案 no → plan 索引
const PI={};
PLANS.forEach(p=>PI[p.no]=p);

// 計畫區位階顏色
function zoneColor(name){
  if(/細部計畫|細部/.test(name)) return '#1a6a4a';
  if(/特定區/.test(name)) return '#7a4a10';
  return '#2a6aaa';
}

// 填計畫區下拉
const selZ=document.getElementById('sel-z');
ZONES.forEach(z=>{
  const o=document.createElement('option');
  o.value=z.dpid; o.textContent=z.name;
  selZ.appendChild(o);
});
// 填年份下拉
const selYr=document.getElementById('sel-yr');
[...new Set(PLANS.map(p=>p.y))].sort((a,b)=>b-a).forEach(y=>{
  const o=document.createElement('option');
  o.value=y; o.textContent=`民國${y}年`; selYr.appendChild(o);
});

// 地圖
const map=L.map('map',{center:[22.68,120.38],zoom:11,preferCanvas:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

// 狀態
let selDpid=null, fDpid='', fCat='', fLv='', fYr='', fQ='', qCat='', qLv='';

// 樣式
const DS=z=>({color:'#0e0e1a',weight:1.2,fillColor:zoneColor(z.name),fillOpacity:.55});
const HS={color:'#aac8f0',weight:2,fillOpacity:.75};
const SS={color:'#fff',weight:2.5,fillColor:'#5a90e8',fillOpacity:.88};
const DIM=z=>({color:'#0a0a14',weight:.5,fillColor:zoneColor(z.name),fillOpacity:.12});

const LYRS={};
ZONES.forEach(z=>{
  const coords=z.r.map(ring=>ring.map(pt=>[pt[1],pt[0]]));
  const lyr=L.polygon(coords,DS(z))
    .on('mouseover',e=>{if(selDpid!==z.dpid)e.target.setStyle(HS);showTip(e.originalEvent,z);})
    .on('mouseout',e=>{if(selDpid!==z.dpid)restyle(z);hideTip();})
    .on('click',()=>clickZone(z))
    .bindTooltip(z.name,{permanent:false,direction:'top',className:'leaflet-tooltip'})
    .addTo(map);
  LYRS[z.dpid]={lyr,z};
});

function restyle(z){
  const dim=fDpid&&z.dpid!==parseInt(fDpid);
  LYRS[z.dpid].lyr.setStyle(dim?DIM(z):DS(z));
}
function restyleAll(){
  Object.values(LYRS).forEach(({lyr,z})=>{
    if(z.dpid===selDpid) lyr.setStyle(SS);
    else restyle(z);
  });
}

function clickZone(z){
  if(selDpid===z.dpid){
    selDpid=null; fDpid='';
    document.getElementById('sel-z').value='';
    setInfo(null);
  } else {
    selDpid=z.dpid; fDpid=String(z.dpid);
    document.getElementById('sel-z').value=z.dpid;
    setInfo(z);
  }
  restyleAll(); renderList();
}

function setInfo(z){
  const nm=document.getElementById('info-name');
  const sb=document.getElementById('info-sub');
  const chips=document.getElementById('info-chips');
  if(!z){
    nm.textContent='點選地圖計畫區查看相關計畫案';
    sb.textContent='或使用上方篩選條件';
    chips.innerHTML=''; return;
  }
  nm.textContent=z.name;
  // 位階判斷
  const lv=/細部/.test(z.name)?'細部計畫':/特定區/.test(z.name)?'特定區計畫':'主要計畫';
  const cnt=(ZP[String(z.dpid)]||[]).length;
  sb.textContent=`DPID: ${z.dpid}`;
  chips.innerHTML=`
    <span class="ichip hi">計畫案 ${cnt} 筆</span>
    <span class="ichip">${lv}</span>
    <span class="ichip">中心 ${z.cy}°N, ${z.cx}°E</span>
  `;
}

// 篩選計畫案
function getFiltered(){
  const cat=fCat||qCat, lv=fLv||qLv;
  let r=PLANS;
  if(fDpid){
    const nos=new Set(ZP[fDpid]||[]);
    r=r.filter(p=>nos.has(p.no));
  }
  if(cat) r=r.filter(p=>p.cat===cat);
  if(lv)  r=r.filter(p=>p.lv===lv);
  if(fYr) r=r.filter(p=>p.y===parseInt(fYr));
  if(fQ)  r=r.filter(p=>p.t.includes(fQ));
  return r;
}

const LVC={'主要計畫':'t-主要','細部計畫':'t-細部','特定區計畫':'t-特定','其他':'t-其他'};
const CATC={'通盤檢討':'t-通盤','個案變更':'t-個案'};

function renderList(){
  const data=getFiltered();
  document.getElementById('h-plan').textContent=data.length.toLocaleString();
  const list=document.getElementById('list');
  if(!data.length){
    list.innerHTML='<div class="empty">無符合條件的計畫案</div>';
    document.getElementById('foot').textContent=''; return;
  }
  list.innerHTML=data.slice(0,300).map(p=>`
    <div class="card">
      <div class="ctop"><span class="cno">${p.no}</span><span class="cdate">民${p.y}/${String(p.m).padStart(2,'0')}</span></div>
      <div class="ctitle">${p.t}</div>
      <div class="tags">
        <span class="tag ${CATC[p.cat]||'t-其他'}">${p.cat}</span>
        <span class="tag ${LVC[p.lv]||'t-其他'}">${p.lv}</span>
        <span class="tag ttp">${p.tp}</span>
      </div>
    </div>`).join('');
  document.getElementById('foot').textContent=`共 ${data.length} 筆${data.length>300?' (顯示前300)':''}`;
}

// Tooltip
const tip=document.getElementById('tip');
function showTip(e,z){
  const cnt=(ZP[String(z.dpid)]||[]).length;
  const lv=/細部/.test(z.name)?'細部計畫':/特定區/.test(z.name)?'特定區計畫':'主要計畫';
  tip.innerHTML=`<div class="tipn">${z.name}</div>
    <div class="tipd">${lv}</div>
    <div style="font-size:10px;color:#6080a8;margin-top:2px">相關計畫案 ${cnt} 筆</div>
    <div class="tiph">點選查看詳細</div>`;
  tip.style.display='block'; moveTip(e);
}
function hideTip(){tip.style.display='none';}
function moveTip(e){
  const tw=250,th=100;
  tip.style.left=(e.clientX+tw>window.innerWidth?e.clientX-tw-10:e.clientX+14)+'px';
  tip.style.top=(e.clientY+th>window.innerHeight?e.clientY-th:e.clientY-10)+'px';
}
document.addEventListener('mousemove',e=>{if(tip.style.display==='block')moveTip(e);});

// 計畫區下拉
document.getElementById('sel-z').addEventListener('change',e=>{
  const dpid=e.target.value;
  fDpid=dpid; selDpid=dpid?parseInt(dpid):null;
  const z=dpid?ZONES.find(z=>z.dpid===parseInt(dpid)):null;
  if(z){
    setInfo(z);
    const all=z.r.flat();
    const lats=all.map(p=>p[1]),lons=all.map(p=>p[0]);
    map.fitBounds([[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]],{padding:[40,40],maxZoom:14});
  } else {
    setInfo(null);
    map.setView([22.68,120.38],11);
  }
  restyleAll(); renderList();
});

document.getElementById('sel-cat').addEventListener('change',e=>{fCat=e.target.value;renderList();});
document.getElementById('sel-lv').addEventListener('change',e=>{fLv=e.target.value;renderList();});
document.getElementById('sel-yr').addEventListener('change',e=>{fYr=e.target.value;renderList();});
document.getElementById('q').addEventListener('input',e=>{fQ=e.target.value.trim();renderList();});

document.querySelectorAll('.qp').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.f,v=btn.dataset.v,was=btn.classList.contains('on');
    if(f==='cat'){document.querySelectorAll('[data-f="cat"]').forEach(b=>b.classList.remove('on'));qCat=was?'':v;}
    else{document.querySelectorAll('[data-f="lv"]').forEach(b=>b.classList.remove('on'));qLv=was?'':v;}
    if(!was)btn.classList.add('on');
    renderList();
  });
});

renderList();
</script>
</body></html>
